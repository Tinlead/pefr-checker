<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบค่า PEFR</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <circle cx="50" cy="50" r="45" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
                    <path d="M 35 60 Q 35 40 50 35 Q 65 40 65 60" fill="#4caf50" opacity="0.8"/>
                    <circle cx="40" cy="45" r="5" fill="#9c27b0"/>
                    <circle cx="60" cy="45" r="5" fill="#2196f3"/>
                </svg>
            </div>
            <h1>ระบบตรวจสอบค่า PEFR</h1>
            <p>วัดค่าความเร็วสูงสุดของการเป่าลมเพื่อประเมินสมรรถภาพปอด</p>
        </div>

        <form id="form-ferf" class="form-container">
            <div class="form-group">
                <label for="age">
                    <span class="icon">🎂</span> อายุ (ปี)
                </label>
                <input type="number" id="age" name="age" min="0" max="120" placeholder="กรุณากรอกอายุ" required>
            </div>

            <div class="form-group">
                <label for="height">
                    <span class="icon">📏</span> ส่วนสูง (ซม.)
                </label>
                <input type="number" id="height" name="height" min="50" max="250" placeholder="กรุณากรอกส่วนสูง" required>
            </div>

            <div class="form-group">
                <label for="gender">
                    <span class="icon">👥</span> เพศ
                </label>
                <select id="gender" name="gender" required>
                    <option value="">-- เลือกเพศ --</option>
                    <option value="male">ชาย</option>
                    <option value="female">หญิง</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fev">
                    <span class="icon">💨</span> ค่า PEFR ที่วัดได้ (L/min)
                </label>
                <input type="number" id="fev" name="fev" min="0" max="1000" step="1" placeholder="กรอกค่า PEFR เช่น 450" required>
                <div class="input-note">เปรียบเทียบกับค่ามาตรฐาน PEFR จาก PDF</div>
            </div>

            <button type="button" class="btn-submit" onclick="calculateFERF()">
                📊 ตรวจสอบผล
            </button>
        </form>

        <div id="result-container" class="result-container" style="display: none;">
            <button type="button" class="btn-back-small" onclick="resetForm()">
                ← ย้อนกลับ
            </button>
            
            <div class="result-content">
                <div class="result-header">
                    <span class="result-icon">💬</span>
                    <h2>ผลการคำนวณ</h2>
                </div>

                <div class="result-box">
                    <div class="result-info-title">📊 ข้อมูลที่ใช้ในการคำนวณ:</div>
                    
                    <div class="result-info-grid">
                        <div class="info-col">
                            <div class="info-row">
                                <span class="info-label">อายุ :</span>
                                <span class="info-value" id="result-age"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">ส่วนสูง :</span>
                                <span class="info-value" id="result-height"></span>
                            </div>
                        </div>
                        <div class="info-col">
                            <div class="info-row">
                                <span class="info-label">เพศ :</span>
                                <span class="info-value" id="result-gender"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">ค่าการเป่าลม :</span>
                                <span class="info-value" id="result-fev"></span>
                            </div>
                        </div>
                    </div>

                    <div class="result-ferf-display">
                        <span class="ferf-value-large" id="result-ferf"></span>
                    </div>

                    <div class="result-info-message">
                        <div class="info-item">
                            <span class="info-icon">ℹ</span>
                            <span id="result-message"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">ℹ</span>
                            <span id="result-status"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data/pefr_data.js"></script>
    <script src="js/sheets-handler.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
